function renderStatsPanel() {
  var html = '';
  html += '<div class="inner-tabs">';
  var stabs = [['summary','요약'],['monthly','월간'],['yearly','연간'],['service','서비스']];
  stabs.forEach(function(t){
    html += '<button class="inner-tab ' + (statsTab===t[0]?'active':'') + '" onclick="setStatsTab(\'' + t[0] + '\')">' + t[1] + '</button>';
  });
  html += '</div>';

  if (statsTab === 'summary') html += renderStatsSummary();
  else if (statsTab === 'monthly') html += renderStatsMonthly();
  else if (statsTab === 'yearly') html += renderStatsYearly();
  else if (statsTab === 'service') html += renderStatsService();

  document.getElementById('panel-stats-body').innerHTML = html;
}

function setStatsTab(t) { statsTab = t; renderStatsPanel(); }

function renderStatsSummary() {
  var today = todayStr();
  var thisMonth = today.substr(0,7);
  var lastMonth = getLastMonth(today);
  var thisYear = today.substr(0,4);

  var thisMonthRev = bookings.filter(function(b){ return (b.date||'').substr(0,7)===thisMonth && isRevenu(b); }).reduce(function(s,b){ return s+(b.price||0); },0);
  var lastMonthRev = bookings.filter(function(b){ return (b.date||'').substr(0,7)===lastMonth && isRevenu(b); }).reduce(function(s,b){ return s+(b.price||0); },0);
  var thisMonthDone = bookings.filter(function(b){ return (b.date||'').substr(0,7)===thisMonth && b.status==='done' && !b.ticketId; }).length;
  var avgPrice = thisMonthDone > 0 ? Math.round(thisMonthRev / thisMonthDone) : 0;
  var pctChange = lastMonthRev > 0 ? Math.round((thisMonthRev - lastMonthRev) / lastMonthRev * 100) : 0;

  // 올해 월평균
  var yearMonths = {};
  bookings.forEach(function(b){
    if ((b.date||'').substr(0,4) !== thisYear || !isRevenu(b)) return;
    var m = b.date.substr(0,7);
    yearMonths[m] = (yearMonths[m]||0) + (b.price||0);
  });
  var ymKeys = Object.keys(yearMonths);
  var yearAvg = ymKeys.length > 0 ? Math.round(Object.values(yearMonths).reduce(function(s,v){ return s+v; },0) / ymKeys.length) : 0;

  // 올해 1회단가
  var yearDone = bookings.filter(function(b){ return (b.date||'').substr(0,4)===thisYear && b.status==='done' && !b.ticketId && isRevenu(b); });
  var yearAvgPrice = yearDone.length > 0 ? Math.round(yearDone.reduce(function(s,b){ return s+(b.price||0); },0) / yearDone.length) : 0;

  // 활성회원 90일
  var d90 = new Date(); d90.setDate(d90.getDate()-90);
  var d90Str = d90.getFullYear() + '-' + pad2(d90.getMonth()+1) + '-' + pad2(d90.getDate());
  var activeMembers = members.filter(function(m){ return m.lastVisit && m.lastVisit >= d90Str; }).length;

  var html = '';
  // 이달 하이라이트
  html += '<div style="background:linear-gradient(135deg,#4caf50,#1b5e20);border-radius:14px;padding:18px;color:#fff;margin-bottom:14px;">';
  html += '<div style="font-size:12px;opacity:0.85;margin-bottom:4px;">이번달 매출 (' + thisMonth + ')</div>';
  html += '<div style="font-size:26px;font-weight:900;">' + fmtMoney(thisMonthRev) + '</div>';
  html += '<div style="display:flex;gap:12px;margin-top:8px;font-size:12px;opacity:0.9;">';
  html += '<span>전월대비 ' + (pctChange >= 0 ? '▲' : '▼') + Math.abs(pctChange) + '%</span>';
  html += '<span>완료 ' + thisMonthDone + '건</span>';
  html += '<span>1회 ' + fmtMoney(avgPrice) + '</span>';
  html += '</div>';
  html += '<button class="btn btn-sm" style="margin-top:10px;background:rgba(255,255,255,0.2);color:#fff;" onclick="openPaymentDetail(\'' + thisMonth + '\',\'month\')">이번달 결제 상세보기 ›</button>';
  html += '</div>';

  // KPI 3열
  html += '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px;">';
  html += '<div class="kpi-card"><div class="kpi-label">올해 월평균</div><div class="kpi-value" style="font-size:13px;">' + fmtMoney(yearAvg) + '</div></div>';
  html += '<div class="kpi-card"><div class="kpi-label">올해 1회단가</div><div class="kpi-value" style="font-size:13px;">' + fmtMoney(yearAvgPrice) + '</div></div>';
  html += '<div class="kpi-card"><div class="kpi-label">활성 회원(90일)</div><div class="kpi-value">' + activeMembers + '<span style="font-size:12px;font-weight:400;">명</span></div></div>';
  html += '</div>';

  // 잔여 이용권 현황
  var activeTickets = tickets.filter(function(t){ return !t.closed; });
  var moneyTickets = activeTickets.filter(function(t){ return t.type === 'money'; });
  var countTickets = activeTickets.filter(function(t){ return t.type === 'count'; });
  var totalMoneyRemain = moneyTickets.reduce(function(s,t){ return s+(t.remain||0); },0);
  var totalCountRemain = countTickets.reduce(function(s,t){ return s+(t.remain||0); },0);

  // 30일 내 만료
  var d30 = new Date(); d30.setDate(d30.getDate()+30);
  var d30Str = d30.getFullYear() + '-' + pad2(d30.getMonth()+1) + '-' + pad2(d30.getDate());
  var expiringTickets = activeTickets.filter(function(t){ return t.expire && t.expire <= d30Str && t.expire >= today; });

  html += '<div class="card">';
  html += '<div class="card-title">잔여 이용권 현황</div>';
  html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;">';
  html += '<div class="kpi-card"><div class="kpi-label">💰 금액권 총 잔액</div><div class="kpi-value" style="font-size:13px;">' + fmtMoney(totalMoneyRemain) + '</div><div class="kpi-sub">' + moneyTickets.length + '명 보유</div></div>';
  html += '<div class="kpi-card"><div class="kpi-label">🔢 횟수권 잔여</div><div class="kpi-value">' + totalCountRemain + '<span style="font-size:12px;font-weight:400;">회</span></div><div class="kpi-sub">' + countTickets.length + '명 보유</div></div>';
  html += '</div>';

  if (expiringTickets.length > 0) {
    html += '<div style="background:#fff3cd;border:1px solid var(--gold);border-radius:8px;padding:10px;margin-bottom:10px;">';
    html += '<div style="font-size:12px;font-weight:700;color:#92400e;margin-bottom:6px;">⚠️ 30일 내 만료 예정 ' + expiringTickets.length + '건</div>';
    expiringTickets.forEach(function(t){
      html += '<div style="font-size:12px;padding:3px 0;">' + memberLink(t.memberName, '') + ' — ' + esc(t.name) + ' (' + t.expire + ')</div>';
    });
    html += '</div>';
  }

  activeTickets.forEach(function(t){
    html += '<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px;">';
    html += '<div style="flex:1;">' + memberLink(t.memberName, '') + ' <span style="color:var(--text2);">' + esc(t.name) + '</span></div>';
    html += payMethodBadge(t.payMethod);
    html += '<div style="font-weight:700;color:var(--primary-dark);">' + (t.type==='money' ? fmtMoney(t.remain) : t.remain+'회') + '</div>';
    html += '</div>';
  });
  html += '</div>';

  return html;
}

function getLastMonth(todayStr) {
  var y = parseInt(todayStr.substr(0,4));
  var m = parseInt(todayStr.substr(5,2)) - 1;
  if (m < 1) { m = 12; y--; }
  return y + '-' + pad2(m);
}

function renderStatsMonthly() {
  var today = todayStr();
  var months = [];
  var d = new Date();
  for (var i = 0; i < 12; i++) {
    months.unshift(d.getFullYear() + '-' + pad2(d.getMonth()+1));
    d.setMonth(d.getMonth()-1);
  }

  var monthData = months.map(function(m){
    var rev = bookings.filter(function(b){ return (b.date||'').substr(0,7)===m && isRevenu(b); }).reduce(function(s,b){ return s+(b.price||0); },0);
    var cnt = bookings.filter(function(b){ return (b.date||'').substr(0,7)===m && b.status==='done' && !b.ticketId && isRevenu(b); }).length;
    return {m, rev, cnt, avg: cnt > 0 ? Math.round(rev/cnt) : 0};
  });

  var maxRev = Math.max.apply(null, monthData.map(function(d){ return d.rev; })) || 1;

  var html = '<div class="card">';
  monthData.forEach(function(d){
    var pct = Math.round(d.rev / maxRev * 100);
    var label = d.m.substr(5) + '월';
    html += '<div class="bar-row">';
    html += '<div class="bar-label">' + label + '</div>';
    html += '<div class="bar-track"><div class="bar-fill" style="width:' + pct + '%"></div><span class="bar-value">' + (d.rev > 0 ? fmtMoney(d.rev) : '') + '</span></div>';
    html += '<button class="btn btn-sm btn-ghost" onclick="openPaymentDetail(\'' + d.m + '\',\'month\')">상세›</button>';
    html += '</div>';
  });
  html += '</div>';
  return html;
}

function renderStatsYearly() {
  var today = todayStr();
  var currentYear = parseInt(today.substr(0,4));
  var years = [currentYear-3, currentYear-2, currentYear-1, currentYear];

  var yearData = years.map(function(y){
    var rev = bookings.filter(function(b){ return (b.date||'').substr(0,4)===String(y) && isRevenu(b); }).reduce(function(s,b){ return s+(b.price||0); },0);
    var cnt = bookings.filter(function(b){ return (b.date||'').substr(0,4)===String(y) && b.status==='done' && isRevenu(b); }).length;
    return {y, rev, cnt};
  });

  var maxRev = Math.max.apply(null, yearData.map(function(d){ return d.rev; })) || 1;

  var html = '<div class="card">';
  yearData.forEach(function(d, i){
    var pct = Math.round(d.rev / maxRev * 100);
    var growth = '';
    if (i > 0 && yearData[i-1].rev > 0) {
      var g = Math.round((d.rev - yearData[i-1].rev) / yearData[i-1].rev * 100);
      growth = ' <span style="font-size:11px;color:' + (g>=0 ? 'var(--primary)' : 'var(--red)') + ';">' + (g>=0?'▲':'▼') + Math.abs(g) + '%</span>';
    }
    html += '<div class="bar-row">';
    html += '<div class="bar-label">' + d.y + '</div>';
    html += '<div class="bar-track"><div class="bar-fill blue" style="width:' + pct + '%"></div><span class="bar-value">' + (d.rev > 0 ? fmtMoney(d.rev) : '') + '</span></div>';
    html += '<button class="btn btn-sm btn-ghost" onclick="openPaymentDetail(\'' + d.y + '\',\'year\')">상세›</button>';
    html += '</div>';
    html += '<div style="font-size:11px;color:var(--text2);padding-left:46px;margin-bottom:8px;">완료 ' + d.cnt + '건' + growth + '</div>';
  });
  html += '</div>';
  return html;
}

function renderStatsService() {
  var today = todayStr();
  var thisMonth = today.substr(0,7);

  var svcMap = {};
  bookings.forEach(function(b){
    if ((b.date||'').substr(0,7) !== thisMonth || !isRevenu(b)) return;
    var s = b.service || '기타';
    svcMap[s] = (svcMap[s]||0) + (b.price||0);
  });

  var total = Object.values(svcMap).reduce(function(s,v){ return s+v; },0) || 1;
  var svcArr = Object.keys(svcMap).map(function(k){ return {name:k, rev:svcMap[k]}; });
  svcArr.sort(function(a,b){ return b.rev-a.rev; });

  // TOP 10 고객
  var custMap = {};
  bookings.forEach(function(b){
    if (!isRevenu(b)) return;
    var key = b.name;
    custMap[key] = (custMap[key]||0) + (b.price||0);
  });
  var custArr = Object.keys(custMap).map(function(k){ return {name:k, rev:custMap[k]}; });
  custArr.sort(function(a,b){ return b.rev-a.rev; });
  var top10 = custArr.slice(0,10);

  var html = '<div class="card"><div class="card-title">이번달 서비스별 매출 비중</div>';
  if (svcArr.length === 0) {
    html += '<div style="color:var(--text3);text-align:center;padding:20px 0;">데이터 없음</div>';
  } else {
    svcArr.forEach(function(s){
      var pct = Math.round(s.rev / total * 100);
      html += '<div style="margin-bottom:10px;">';
      html += '<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;"><span>' + esc(s.name) + '</span><span style="font-weight:700;">' + fmtMoney(s.rev) + ' (' + pct + '%)</span></div>';
      html += '<div class="progress-bar" style="height:8px;"><div class="progress-fill" style="width:' + pct + '%"></div></div>';
      html += '</div>';
    });
  }
  html += '</div>';

  html += '<div class="card"><div class="card-title">매출 TOP 10 고객</div>';
  if (top10.length === 0) {
    html += '<div style="color:var(--text3);text-align:center;padding:20px 0;">데이터 없음</div>';
  } else {
    top10.forEach(function(c, i){
      html += '<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;">';
      html += '<div style="width:22px;height:22px;border-radius:50%;background:var(--primary-pale);color:var(--primary-dark);font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;">' + (i+1) + '</div>';
      html += '<div style="flex:1;">' + memberLink(c.name, '') + '</div>';
      html += '<div style="font-weight:700;">' + fmtMoney(c.rev) + '</div>';
      html += '</div>';
    });
  }
  html += '</div>';
  return html;
}

// ============================================================
// ===== 결제 상세 패널 =====
// ============================================================
function openPaymentDetail(period, type) {
  document.getElementById('panel-payment-detail-title').textContent = (type === 'year' ? period + '년' : period) + ' 결제 상세';
  var body = renderPaymentDetailBody(period, type);
  document.getElementById('panel-payment-detail-body').innerHTML = body;
  openPanel('panel-payment-detail');
}

function renderPaymentDetailBody(period, type) {
  var filtered = bookings.filter(function(b){
    if (b.status === 'cancelled') return false;
    if (type === 'month') return (b.date||'').substr(0,7) === period;
    if (type === 'year') return (b.date||'').substr(0,4) === period;
    return false;
  });

  // 결제수단별 합계 (매출 기준)
  var payTotals = {card:0, cash:0, transfer:0, '':0};
  filtered.forEach(function(b){
    if (!isRevenu(b)) return;
    var pm = b.payMethod || '';
    payTotals[pm] = (payTotals[pm]||0) + (b.price||0);
  });

  var html = '';
  // 결제수단별 합계 요약
  html += '<div class="card" style="padding:12px;">';
  html += '<div style="display:flex;gap:8px;flex-wrap:wrap;">';
  if (payTotals['card'] > 0) html += '<div style="flex:1;text-align:center;background:var(--blue-light);border-radius:8px;padding:8px;"><div style="font-size:11px;color:var(--text2);">💳 카드</div><div style="font-size:14px;font-weight:800;color:#1d4ed8;">' + fmtMoney(payTotals['card']) + '</div></div>';
  if (payTotals['cash'] > 0) html += '<div style="flex:1;text-align:center;background:var(--primary-pale);border-radius:8px;padding:8px;"><div style="font-size:11px;color:var(--text2);">💵 현금</div><div style="font-size:14px;font-weight:800;color:var(--primary-dark);">' + fmtMoney(payTotals['cash']) + '</div></div>';
  if (payTotals['transfer'] > 0) html += '<div style="flex:1;text-align:center;background:var(--gold-light);border-radius:8px;padding:8px;"><div style="font-size:11px;color:var(--text2);">🏦 이체</div><div style="font-size:14px;font-weight:800;color:#92400e;">' + fmtMoney(payTotals['transfer']) + '</div></div>';
  html += '</div></div>';

  if (type === 'month') {
    // 날짜별 그룹
    var dateMap = {};
    filtered.forEach(function(b){
      var d = b.date || '';
      if (!dateMap[d]) dateMap[d] = [];
      dateMap[d].push(b);
    });
    var dates = Object.keys(dateMap).sort().reverse();

    dates.forEach(function(d){
      var dayBookings = dateMap[d];
      dayBookings.sort(function(a,b){ return (a.time||'').localeCompare(b.time||''); });
      var dayTotal = dayBookings.filter(function(b){ return isRevenu(b); }).reduce(function(s,b){ return s+(b.price||0); },0);

      html += '<div class="card" style="padding:12px;">';
      html += '<div style="display:flex;justify-content:space-between;font-size:13px;font-weight:700;padding-bottom:8px;border-bottom:1px solid var(--border);">';
      html += '<span>' + fmtDate(d) + ' (' + WEEKDAYS[new Date(d).getDay()] + ')</span>';
      html += '<span style="color:var(--primary-dark);">' + fmtMoney(dayTotal) + '</span>';
      html += '</div>';
      dayBookings.forEach(function(b){
        html += '<div style="display:flex;align-items:center;gap:6px;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px;">';
        html += '<span style="color:var(--text3);min-width:40px;">' + esc(b.time||'') + '</span>';
        html += '<span style="flex:1;">' + memberLink(b.name, b.phone);
        if (b.ticketId) html += ' 🎫';
        if (b.type === '이용권 매출') html += ' 📋';
        html += '</span>';
        html += '<span style="color:var(--text2);">' + esc(b.service||'') + '</span>';
        if (b.payMethod) html += payMethodBadge(b.payMethod);
        if (b.ticketId) html += '<span style="color:var(--text2);">이용권차감</span>';
        else html += '<span style="font-weight:700;">' + fmtMoney(b.price||0) + '</span>';
        html += '</div>';
      });
      html += '</div>';
    });
  } else if (type === 'year') {
    // 월별 아코디언
    var monthMap = {};
    filtered.forEach(function(b){
      var m = (b.date||'').substr(0,7);
      if (!monthMap[m]) monthMap[m] = [];
      monthMap[m].push(b);
    });
    var mKeys = Object.keys(monthMap).sort().reverse();

    mKeys.forEach(function(m){
      var mBooks = monthMap[m];
      var mTotal = mBooks.filter(function(b){ return isRevenu(b); }).reduce(function(s,b){ return s+(b.price||0); },0);
      var accordId = 'accord-' + m.replace('-','');

      html += '<div class="card" style="padding:12px;">';
      html += '<div class="accordion-header" onclick="toggleAccord(\'' + accordId + '\')">';
      html += '<span style="font-weight:700;">' + m.substr(0,4) + '년 ' + parseInt(m.substr(5)) + '월</span>';
      html += '<span style="color:var(--primary-dark);font-weight:800;">' + fmtMoney(mTotal) + '</span>';
      html += '</div>';
      html += '<div id="' + accordId + '" class="accordion-content">';
      mBooks.sort(function(a,b){ return ((a.date||'')+(a.time||'')).localeCompare((b.date||'')+(b.time||'')); });
      mBooks.forEach(function(b){
        html += '<div style="display:flex;align-items:center;gap:6px;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px;">';
        html += '<span style="color:var(--text3);min-width:70px;">' + fmtDate(b.date) + ' ' + esc(b.time||'') + '</span>';
        html += '<span style="flex:1;">' + memberLink(b.name, b.phone) + '</span>';
        html += '<span style="color:var(--text2);">' + esc(b.service||'') + '</span>';
        if (b.payMethod) html += payMethodBadge(b.payMethod);
        html += '<span style="font-weight:700;">' + (b.ticketId ? '이용권' : fmtMoney(b.price||0)) + '</span>';
        html += '</div>';
      });
      html += '</div></div>';
    });
  }

  return html;
}

function toggleAccord(id) {
  var el = document.getElementById(id);
  if (el) el.classList.toggle('open');

function renderMessagePanel() {
  var today = todayStr();
  var targets = getMessageTargets();

  var html = '';
  html += '<div class="card">';
  html += '<div class="card-title">발송 대상 선택</div>';
  var targetTypes = [
    ['all','전체 회원'],['ticket','이용권 보유 회원'],
    ['inactive','비활성 회원 (1개월 미방문)'],['birthday','이번달 생일'],
    ['custom','직접 선택']
  ];
  targetTypes.forEach(function(t){
    html += '<div style="display:flex;align-items:center;gap:8px;padding:8px 0;cursor:pointer;" onclick="setMessageTarget(\'' + t[0] + '\')">';
    html += '<div style="width:18px;height:18px;border-radius:50%;border:2px solid ' + (messageTargetType===t[0] ? 'var(--primary)' : 'var(--border)') + ';background:' + (messageTargetType===t[0] ? 'var(--primary)' : '#fff') + ';display:flex;align-items:center;justify-content:center;">';
    if (messageTargetType===t[0]) html += '<div style="width:8px;height:8px;border-radius:50%;background:#fff;"></div>';
    html += '</div>';
    html += '<span style="font-size:14px;">' + t[1] + '</span>';
    html += '</div>';
  });
  if (messageTargetType === 'custom') {
    html += '<div style="margin-top:10px;">';
    html += '<input class="form-input" type="text" id="msg-search" placeholder="이름 검색" oninput="msgSearchMember(this.value)">';
    html += '<div id="msg-autocomplete" class="autocomplete-list" style="display:none;"></div>';
    html += '<div id="msg-chips" style="margin-top:8px;display:flex;flex-wrap:wrap;gap:4px;">';
    messageCustomIds.forEach(function(id){
      var m = members.find(function(x){ return x.id === id; });
      if (m) html += '<div class="chip">' + esc(m.name) + ' <span class="chip-remove" onclick="removeMessageCustom(\'' + id + '\')">✕</span></div>';
    });
    html += '</div>';
    html += '</div>';
  }
  html += '</div>';

  // 미리보기
  html += '<div class="card">';
  html += '<div class="card-title">발송 미리보기</div>';
  html += '<div style="font-size:32px;font-weight:900;color:var(--primary);text-align:center;margin-bottom:8px;">' + targets.length + '<span style="font-size:16px;">명</span></div>';
  var preview = targets.slice(0,5);
  preview.forEach(function(m){
    html += '<span class="member-link" style="margin-right:6px;" onclick="openMemberDetail(\'' + m.id + '\')">' + esc(m.name) + '</span>';
  });
  if (targets.length > 5) html += '<span style="color:var(--text3);font-size:13px;">+ 외 ' + (targets.length-5) + '명</span>';
  html += '</div>';

  html += '<div class="card">';
  html += '<div class="card-title">메시지 내용</div>';
  html += '<div style="margin-bottom:10px;"><label style="font-size:12px;font-weight:600;color:var(--text2);">메시지 타입</label><br>';
  html += '<div style="display:flex;gap:8px;margin-top:6px;">';
  html += '<button class="btn btn-sm btn-outline" id="msg-type-kakao" onclick="setMsgType(\'kakao\')" style="flex:1;">카카오 알림톡</button>';
  html += '<button class="btn btn-sm btn-outline" id="msg-type-sms" onclick="setMsgType(\'sms\')" style="flex:1;">SMS</button>';
  html += '</div></div>';
  html += '<textarea class="form-input" id="msg-content" rows="4" placeholder="메시지 내용을 입력하세요"></textarea>';
  html += '<button class="btn btn-block btn-primary" style="margin-top:10px;" onclick="sendGroupMessage()">발송하기 (' + targets.length + '명)</button>';
  html += '</div>';

  document.getElementById('panel-message-body').innerHTML = html;
}

function getMessageTargets() {
  var today = todayStr();
  if (messageTargetType === 'all') return members.slice();
  if (messageTargetType === 'ticket') {
    var tIds = tickets.filter(function(t){ return !t.closed; }).map(function(t){ return t.memberId; });
    return members.filter(function(m){ return tIds.indexOf(m.id) !== -1; });
  }
  if (messageTargetType === 'inactive') {
    var cutoff = new Date(); cutoff.setMonth(cutoff.getMonth()-1);
    var cutoffStr = cutoff.getFullYear() + '-' + pad2(cutoff.getMonth()+1) + '-' + pad2(cutoff.getDate());
    return members.filter(function(m){ return !m.lastVisit || m.lastVisit < cutoffStr; });
  }
  if (messageTargetType === 'birthday') {
    var thisMonth = today.substr(5,2);
    return members.filter(function(m){ return m.birth && m.birth.substr(0,2) === thisMonth; });
  }
  if (messageTargetType === 'custom') {
    return members.filter(function(m){ return messageCustomIds.indexOf(m.id) !== -1; });
  }
  return [];
}

function setMessageTarget(t) {
  messageTargetType = t;
  if (t !== 'custom') messageCustomIds = [];
  renderMessagePanel();
}
function setMsgType(t) {
  document.getElementById('msg-type-kakao').classList.toggle('btn-primary', t==='kakao');
  document.getElementById('msg-type-sms').classList.toggle('btn-primary', t==='sms');
}
function msgSearchMember(v) {
  var el = document.getElementById('msg-autocomplete');
  if (!v) { el.style.display = 'none'; return; }
  var matches = members.filter(function(m){ return m.name.indexOf(v) !== -1; }).slice(0,5);
  if (matches.length === 0) { el.style.display = 'none'; return; }
  el.innerHTML = matches.map(function(m){
    return '<div class="autocomplete-item" onclick="addMessageCustom(\'' + m.id + '\')">' + esc(m.name) + '</div>';
  }).join('');
  el.style.display = 'block';
}
function addMessageCustom(id) {
  if (messageCustomIds.indexOf(id) === -1) messageCustomIds.push(id);
  document.getElementById('msg-autocomplete').style.display = 'none';
  document.getElementById('msg-search').value = '';
  renderMessagePanel();
}
function removeMessageCustom(id) {
  messageCustomIds = messageCustomIds.filter(function(x){ return x !== id; });
  renderMessagePanel();
}
function sendGroupMessage() {
  var targets = getMessageTargets();
  var content = (document.getElementById('msg-content')||{}).value || '';
  if (!content) { showToast('메시지 내용을 입력해주세요'); return; }
  showConfirm('단체 메시지 발송', targets.length + '명에게 메시지를 발송하시겠습니까?', function(){
    var phones = targets.map(function(m){ return m.phone; }).filter(Boolean);
    fetch('/api/alimtalk', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({templateCode:'group', phones, message: content})
    }).then(function(){ showToast('발송 완료 (' + targets.length + '명)'); })
      .catch(function(){ showToast('발송 중 오류가 발생했습니다'); });
  });
}

function sendAlimtalk(type, data) {
  var templateMap = {
    confirm: 'KA01TP260303085248678ef4l9FvKT92',
    cancel: 'KA01TP260303085406608JlVxRzvGT24',
    deduct: 'KA01TP260303085526915X7VfYFYZD6s',
    shortage: 'KA01TP260303085621327gXfCYSrmKBF'
  };
  var code = templateMap[type];
  if (!code) return;
  var m = findMemberByNameOrPhone(data.name, '');
  var phone = (m && m.phone) || '';
  if (!phone) return;
  fetch('/api/alimtalk', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({templateCode: code, to: phone, variables: data})
  }).then(function(){}).catch(function(){});
}

// ===== Firebase =====
// ============================================================
function fbPull() {
  if (!window._db) { showToast('Firebase 미연결'); return; }
  window._db.collection('limeskin').doc('data').get().then(function(doc){
    if (doc.exists) {
      var d = doc.data();
      var localCount = members.length + bookings.length;
      var remoteCount = (d.members||[]).length + (d.bookings||[]).length;
      if (remoteCount >= localCount) {
        loadFromObj(d);
        saveData();
        showToast('불러오기 완료');
        renderTab(currentTab);
      } else {
        showToast('로컬 데이터가 더 많아 유지합니다');
      }
    } else {
      showToast('Firebase에 저장된 데이터가 없습니다');
    }
  }).catch(function(e){ showToast('불러오기 실패: ' + e.message); });
}

function fbPush() {
  if (!window._db) { showToast('Firebase 미연결'); return; }
  var d = {members,bookings,tickets,ticketHistory,services,settings};
  window._db.collection('limeskin').doc('data').set(d).then(function(){
    showToast('Firebase 백업 완료');
  }).catch(function(e){ showToast('백업 실패: ' + e.message); });
}

function registerSW() {
  if (!('serviceWorker' in navigator)) return;
  var swCode = [
    "self.addEventListener('install',function(e){self.skipWaiting();});",
    "self.addEventListener('activate',function(e){e.waitUntil(clients.claim());});",
    "function checkEvening(){",
    "  var n=new Date();",
    "  if(n.getHours()===21&&n.getMinutes()===0){",
    "    self.registration.showNotification('라임스킨',{",
    "      body:'오늘 마감을 확인해주세요! 수고하셨습니다 🌿',",
    "      icon:'/icon-192.png'",
    "    });",
    "  }",
    "}",
    "setInterval(checkEvening,60000);"
  ].join('\n');
  var blob = new Blob([swCode], {type:'text/javascript'});
  var url = URL.createObjectURL(blob);
  navigator.serviceWorker.register(url).catch(function(){});
}
