// ============================================================
function openBookingModal(id, prefillMember) {
  currentEditBookingId = id;
  var b = id ? bookings.find(function(x){ return x.id === id; }) : null;
  document.getElementById('modal-booking-title').textContent = id ? '예약 수정' : '예약 추가';

  var defaultDate = b ? b.date : todayStr();
  var defaultTime = b ? b.time : '10:00';
  var defaultName = b ? b.name : (prefillMember ? prefillMember.name : '');
  var defaultPhone = b ? b.phone : (prefillMember ? prefillMember.phone : '');

  var svcOptions = '<option value="">서비스 선택</option>';
  services.forEach(function(s){ svcOptions += '<option value="'+esc(s.name)+'"'+(b&&b.service===s.name?' selected':'')+'>'+s.name+' ('+fmtMoney(s.price)+')</option>'; });
  svcOptions += '<option value="__new__">새 서비스 추가...</option>';

  var statusSel = '<select class="form-select" id="bk-status" onchange="onBookingStatusChange()">';
  [['confirmed','예약확정'],['done','완료'],['cancelled','취소']].forEach(function(s){
    statusSel += '<option value="'+s[0]+'"'+(b&&b.status===s[0]?' selected':'')+((!b)&&s[0]==='confirmed'?' selected':'')+'>'+s[1]+'</option>';
  });
  statusSel += '</select>';

  var sourceSel = '<select class="form-select" id="bk-source">';
  [['','선택'],['naver','네이버'],['kakao','카카오'],['phone','전화'],['walk','워크인'],['direct','직접']].forEach(function(s){
    sourceSel += '<option value="'+s[0]+'"'+(b&&b.source===s[0]?' selected':'')+'>'+s[1]+'</option>';
  });
  sourceSel += '</select>';

  var html = '<div class="form-row">';
  html += '<div class="form-group"><div class="form-label">날짜 *</div><input class="form-input" type="date" id="bk-date" value="'+defaultDate+'"></div>';
  html += '<div class="form-group"><div class="form-label">시간 *</div><input class="form-input" type="time" id="bk-time" value="'+defaultTime+'"></div></div>';
  html += '<div class="form-row">';
  html += '<div class="form-group"><div class="form-label">소요시간(분)</div><input class="form-input" type="number" id="bk-duration" value="'+(b?b.duration||60:60)+'"></div>';
  html += '<div class="form-group"><div class="form-label">유입경로</div>'+sourceSel+'</div></div>';
  html += '<div class="form-group autocomplete-wrap"><div class="form-label">이름 *</div><input class="form-input" type="text" id="bk-name" value="'+esc(defaultName)+'" autocomplete="off" oninput="onBookingNameInput(this.value)" placeholder="이름 입력"><div id="bk-autocomplete" class="autocomplete-list" style="display:none"></div></div>';
  html += '<div class="form-group"><div class="form-label">전화번호</div><input class="form-input" type="tel" id="bk-phone" value="'+esc(defaultPhone)+'" placeholder="010-0000-0000"></div>';
  html += '<div class="form-group"><div class="form-label">서비스</div><select class="form-select" id="bk-service" onchange="onServiceSelect(this.value)">'+svcOptions+'</select></div>';
  html += '<div class="form-group"><div class="form-label">금액</div><input class="form-input" type="number" id="bk-price" value="'+(b?b.price||'':'')+'" oninput="onPriceInput(this.value)"><div id="bk-price-hint" style="display:none"></div></div>';
  html += '<div class="form-group"><div class="form-label">결제수단</div><div class="pay-btns" id="bk-pay-btns">'+renderPayMethodBtns(b?b.payMethod||'':'','booking')+'</div></div>';
  html += '<div id="bk-ticket-wrap"></div>';
  html += '<div class="form-group"><div class="form-label">상태</div>'+statusSel+'</div>';
  html += '<div id="bk-unpaid-wrap"></div>';
  html += '<div class="form-group"><div class="form-label">메모</div><textarea class="form-textarea" id="bk-memo">'+(b?b.memo||'':'')+'</textarea></div>';

  // repeat section
  html += '<div style="margin-bottom:14px"><button class="btn btn-outline btn-sm" onclick="toggleRepeatSection()" id="repeat-toggle-btn">🔄 반복 예약 설정</button>';
  html += '<div id="repeat-section" style="display:none" class="repeat-section" style="margin-top:8px">';
  html += '<div class="form-group"><div class="form-label">반복 주기</div><div class="pay-btns"><button class="pay-btn active" data-val="none" onclick="selectRepeat(this,\'none\')">없음</button><button class="pay-btn" data-val="weekly" onclick="selectRepeat(this,\'weekly\')">매주</button><button class="pay-btn" data-val="biweekly" onclick="selectRepeat(this,\'biweekly\')">2주마다</button><button class="pay-btn" data-val="monthly" onclick="selectRepeat(this,\'monthly\')">매월</button></div></div>';
  html += '<div id="repeat-days-wrap" style="display:none" class="form-group"><div class="form-label">반복 요일</div><div class="pay-btns">';
  ['월','화','수','목','금','토','일'].forEach(function(d,i){ html += '<button class="pay-btn" data-val="'+i+'" onclick="this.classList.toggle(\'active\')">'+d+'</button>'; });
  html += '</div></div>';
  html += '<div class="form-row"><div class="form-group"><div class="form-label">종료일</div><input class="form-input" type="date" id="repeat-end"></div>';
  html += '<div class="form-group"><div class="form-label">또는 횟수</div><input class="form-input" type="number" id="repeat-count" placeholder="최대 52" min="1" max="52"></div></div>';
  html += '<div id="repeat-preview" style="font-size:12px;color:var(--primary-dark);padding:6px 0"></div></div></div>';

  document.getElementById('modal-booking-body').innerHTML = html;

  var footer = '';
  if (id) footer += '<button class="btn btn-danger" onclick="deleteBooking(\''+id+'\')">삭제</button>';
  footer += '<button class="btn btn-primary" style="flex:1" onclick="saveBooking()">저장</button>';
  document.getElementById('modal-booking-footer').innerHTML = footer;
  document.getElementById('modal-booking').classList.add('open');

  // trigger ticket section if existing booking has ticket
  if (b && b.ticketId) {
    setTimeout(function(){
      var payBtns = document.querySelectorAll('#bk-pay-btns .pay-btn');
      payBtns.forEach(function(btn){ btn.classList.toggle('active', btn.dataset.val==='ticket'); });
      updateTicketSection(b.name||'', b.ticketId);
    }, 50);
  }

  onBookingStatusChange();
}

function onBookingStatusChange() {
  var status = document.getElementById('bk-status');
  if (!status) return;
  var wrap = document.getElementById('bk-unpaid-wrap');
  if (wrap) {
    if (status.value === 'done') {
      var b = currentEditBookingId ? bookings.find(function(x){ return x.id === currentEditBookingId; }) : null;
      wrap.innerHTML = '<div class="form-group"><label style="display:flex;align-items:center;gap:8px;cursor:pointer"><input type="checkbox" id="bk-unpaid" '+(b&&b.unpaid?'checked':'')+' onchange=""> <span style="font-size:13px">💸 나중에 결제 (미수금)</span></label></div>';
    } else {
      wrap.innerHTML = '';
    }
  }
}

function toggleRepeatSection() {
  var sec = document.getElementById('repeat-section');
  if (sec) sec.style.display = sec.style.display==='none' ? 'block' : 'none';
}

function selectRepeat(btn, val) {
  document.querySelectorAll('.repeat-section .pay-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  var daysWrap = document.getElementById('repeat-days-wrap');
  if (daysWrap) daysWrap.style.display = (val==='weekly'||val==='biweekly') ? 'block' : 'none';
}

function onBookingNameInput(val) {
  var list = document.getElementById('bk-autocomplete');
  if (!list) return;
  if (!val || val.length < 1) { list.style.display='none'; return; }
  var matches = members.filter(function(m){ return m.name.indexOf(val)!==-1 || (m.phone||'').indexOf(val)!==-1; }).slice(0,6);
  if (matches.length === 0) { list.style.display='none'; return; }
  list.innerHTML = matches.map(function(m){ return '<div class="autocomplete-item" onclick="selectBookingMember(\''+m.id+'\')">'+m.name+(m.phone?' · '+fmtPhone(m.phone):'')+'</div>'; }).join('');
  list.style.display = 'block';
}

function selectBookingMember(id) {
  var m = members.find(function(x){ return x.id === id; });
  if (!m) return;
  document.getElementById('bk-name').value = m.name;
  if (document.getElementById('bk-phone')) document.getElementById('bk-phone').value = m.phone||'';
  document.getElementById('bk-autocomplete').style.display = 'none';
  updateTicketSection(m.name, null);
}

function onServiceSelect(val) {
  if (val === '__new__') { closeModal('booking'); openServiceModal(null); return; }
  var svc = services.find(function(s){ return s.name === val; });
  if (svc && svc.price) {
    document.getElementById('bk-price').value = svc.price;
  }
}

function onPriceInput(val) {
  var svcEl = document.getElementById('bk-service');
  if (!svcEl) return;
  var svc = services.find(function(s){ return s.name === svcEl.value; });
  var hint = document.getElementById('bk-price-hint');
  if (hint && svc && parseInt(val) !== parseInt(svc.price)) {
    hint.style.display = 'block';
    hint.innerHTML = '<div class="hint-text" onclick="saveServicePrice(\''+svc.id+'\')">💡 이 금액('+fmtMoney(val)+')을 기본으로 저장할까요?</div>';
  } else if (hint) {
    hint.style.display = 'none';
  }
}

function saveServicePrice(svcId) {
  var svc = services.find(function(s){ return s.id === svcId; });
  var priceEl = document.getElementById('bk-price');
  if (svc && priceEl) { svc.price = parseInt(priceEl.value)||0; saveData(); showToast('기본 금액이 저장되었습니다'); document.getElementById('bk-price-hint').style.display='none'; }
}

function updateTicketSection(memberName, selectedTicketId) {
  var today = todayStr();
  var memberTickets = tickets.filter(function(t){
    var m = members.find(function(x){ return x.name === memberName; });
    var nameMatch = t.memberName === memberName;
    var idMatch = m && t.memberId === m.id;
    return (nameMatch||idMatch) && !t.closed && t.remain>0 && (!t.expire||t.expire>=today);
  });

  var wrap = document.getElementById('bk-ticket-wrap');
  if (!wrap) return;

  // Check if ticket pay button is active
  var ticketPayActive = false;
  var activePay = document.querySelector('#bk-pay-btns .pay-btn.active');
  if (activePay && activePay.dataset.val === 'ticket') ticketPayActive = true;

  if (!ticketPayActive && memberTickets.length === 0) { wrap.innerHTML = ''; return; }

  var html = '<div class="form-group"><div class="form-label">이용권 선택</div><select class="form-select" id="bk-ticket" onchange="onTicketSelect(this.value)">';
  html += '<option value="">이용권 선택</option>';
  memberTickets.forEach(function(t){
    html += '<option value="'+t.id+'"'+(selectedTicketId===t.id?' selected':'')+'>'+(t.type==='money'?'💰':'🔢')+' '+t.name+' (잔여: '+(t.type==='money'?fmtMoney(t.remain):(t.remain+'회'))+')</option>';
  });
  html += '</select></div><div id="bk-deduct-section"></div>';
  wrap.innerHTML = html;

  if (selectedTicketId) onTicketSelect(selectedTicketId);
}

function onTicketSelect(ticketId) {
  var sec = document.getElementById('bk-deduct-section');
  if (!sec) return;
  if (!ticketId) { sec.innerHTML = ''; return; }
  var t = tickets.find(function(x){ return x.id === ticketId; });
  if (!t) { sec.innerHTML = ''; return; }

  // check if already deducted for current booking
  var alreadyDeducted = currentEditBookingId && ticketHistory.some(function(h){ return h.bookingId === currentEditBookingId && h.ticketId === ticketId; });

  if (alreadyDeducted && t.type === 'count') {
    sec.innerHTML = '<div class="deduct-section"><div style="color:var(--primary-dark);font-weight:600">✅ 이미 차감 완료</div></div>';
    return;
  }

  var html = '<div class="deduct-section"><div class="deduct-title">';
  html += t.type === 'money' ? '💰 금액권 차감 (잔여: '+fmtMoney(t.remain)+')' : '🔢 횟수권 차감 (잔여: '+t.remain+'회)';
  html += '</div>';

  if (t.type === 'count') {
    html += '<div class="count-btns">';
    [1,2,3,4,5].forEach(function(n){
      html += '<button class="count-btn'+(n===1?' active':'')+'" data-val="'+n+'" onclick="selectDeductCount(this)">'+n+'회</button>';
    });
    html += '</div>';
  } else {
    html += '<div class="form-group" style="margin-top:6px"><div class="form-label">차감 금액</div>';
    html += '<input class="form-input" type="number" id="bk-deduct-amount" oninput="updateDeductRemain()" placeholder="차감할 금액">';
    html += '<div id="bk-deduct-remain" style="font-size:12px;color:var(--text2);margin-top:4px"></div></div>';
  }
  html += '</div>';
  sec.innerHTML = html;
}

function selectDeductCount(btn) {
  document.querySelectorAll('.deduct-section .count-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
}

function updateDeductRemain() {
  var amountEl = document.getElementById('bk-deduct-amount');
  var remEl = document.getElementById('bk-deduct-remain');
  if (!amountEl || !remEl) return;
  var ticketEl = document.getElementById('bk-ticket');
  if (!ticketEl) return;
  var t = tickets.find(function(x){ return x.id === ticketEl.value; });
  if (!t) return;
  var deduct = parseInt(amountEl.value)||0;
  remEl.textContent = '차감 후 잔여: ' + fmtMoney(Math.max(0, t.remain - deduct));
}

function saveBooking() {
  var date = document.getElementById('bk-date').value;
  var time = document.getElementById('bk-time').value;
  var name = document.getElementById('bk-name').value.trim();
  var phone = document.getElementById('bk-phone').value.trim();
  var service = document.getElementById('bk-service').value;
  var price = parseInt(document.getElementById('bk-price').value)||0;
  var status = document.getElementById('bk-status').value;
  var source = document.getElementById('bk-source').value;
  var memo = document.getElementById('bk-memo').value;
  var duration = parseInt(document.getElementById('bk-duration').value)||60;
  var unpaidEl = document.getElementById('bk-unpaid');
  var unpaid = unpaidEl ? unpaidEl.checked : false;

  if (!date || !time || !name) { showToast('날짜, 시간, 이름은 필수입니다'); return; }
  if (service === '__new__' || service === '') service = '';

  var activePay = document.querySelector('#bk-pay-btns .pay-btn.active');
  var payMethod = activePay ? activePay.dataset.val : '';

  var ticketEl = document.getElementById('bk-ticket');
  var ticketId = ticketEl ? ticketEl.value : '';

  // get deduct info
  var deductCount = 0, deductAmount = 0;
  if (ticketId && status === 'done') {
    var activeCount = document.querySelector('.deduct-section .count-btn.active');
    if (activeCount) deductCount = parseInt(activeCount.dataset.val)||1;
    var deductAmountEl = document.getElementById('bk-deduct-amount');
    if (deductAmountEl) deductAmount = parseInt(deductAmountEl.value)||0;
  }

  // check repeat
  var repeatActive = document.querySelector('.repeat-section .pay-btn.active');
  var repeatType = repeatActive ? repeatActive.dataset.val : 'none';
  var repeatEndEl = document.getElementById('repeat-end');
  var repeatCountEl = document.getElementById('repeat-count');
  var repeatEnd = repeatEndEl ? repeatEndEl.value : '';
  var repeatCountVal = repeatCountEl ? parseInt(repeatCountEl.value)||0 : 0;

  // auto create/find member
  var memberId = '';
  var existingMember = members.find(function(m){ return m.name===name && (m.phone===phone||(phone===''&&!m.phone)); });
  if (!existingMember && name) {
    existingMember = members.find(function(m){ return m.name===name; });
  }
  if (existingMember) {
    memberId = existingMember.id;
  } else if (name) {
    var newMember = {id:uid(), name:name, phone:phone, email:'', memo:'', birth:'', src:'', visitCount:0, totalSales:0, lastVisit:'', createdAt:new Date().toISOString(), photos:[]};
    members.push(newMember);
    memberId = newMember.id;
  }

  if (currentEditBookingId) {
    var b = bookings.find(function(x){ return x.id === currentEditBookingId; });
    if (b) {
      var oldStatus = b.status;
      Object.assign(b, {date:date,time:time,name:name,phone:phone,service:service,price:price,payMethod:payMethod,ticketId:ticketId,status:status,source:source,memo:memo,duration:duration,memberId:memberId,unpaid:unpaid});
      if (status === 'done' && ticketId && (deductCount > 0 || deductAmount > 0)) {
        performTicketDeduct(ticketId, b.id, deductCount, deductAmount, date, service, price);
      }
      if (oldStatus !== 'cancelled' && status === 'cancelled') sendAlimtalk('cancel', b);
    }
  } else {
    if (repeatType !== 'none') {
      saveRepeatBookings(date, time, name, phone, service, price, payMethod, ticketId, status, source, memo, duration, memberId, unpaid, repeatType, repeatEnd, repeatCountVal);
      return;
    }
    var newB = {id:uid(),date:date,time:time,name:name,phone:phone,service:service,price:price,payMethod:payMethod,ticketId:ticketId||'',status:status,source:source,memo:memo,duration:duration,memberId:memberId,type:'시술 매출',unpaid:unpaid,repeatGroupId:null,repeatIndex:0};
    bookings.push(newB);
    if (status === 'done' && ticketId && (deductCount > 0 || deductAmount > 0)) {
      performTicketDeduct(ticketId, newB.id, deductCount, deductAmount, date, service, price);
    }
    if (status === 'confirmed') sendAlimtalk('confirm', newB);
  }

  saveData();
  closeModal('booking');
  renderTab(currentTab);
  showToast(currentEditBookingId ? '예약이 수정되었습니다' : '예약이 추가되었습니다');
}

function saveRepeatBookings(date, time, name, phone, service, price, payMethod, ticketId, status, source, memo, duration, memberId, unpaid, repeatType, repeatEnd, repeatCountVal) {
  var groupId = uid();
  var currentDate = new Date(date);
  var count = 0;
  var maxCount = repeatCountVal > 0 ? Math.min(repeatCountVal, 52) : 52;
  var endDate = repeatEnd ? new Date(repeatEnd) : null;

  while (count < maxCount) {
    var ds = currentDate.getFullYear()+'-'+pad(currentDate.getMonth()+1)+'-'+pad(currentDate.getDate());
    if (endDate && currentDate > endDate) break;
    var nb = {id:uid(),date:ds,time:time,name:name,phone:phone,service:service,price:price,payMethod:payMethod,ticketId:ticketId||'',status:status,source:source,memo:memo,duration:duration,memberId:memberId,type:'시술 매출',unpaid:unpaid,repeatGroupId:groupId,repeatIndex:count};
    bookings.push(nb);
    count++;
    if (repeatType === 'weekly') currentDate.setDate(currentDate.getDate()+7);
    else if (repeatType === 'biweekly') currentDate.setDate(currentDate.getDate()+14);
    else if (repeatType === 'monthly') currentDate.setMonth(currentDate.getMonth()+1);
    else break;
  }
  saveData();
  closeModal('booking');
  renderTab(currentTab);
  showToast('반복 예약 '+count+'개 추가되었습니다');
}

function deleteBooking(id) {
  var b = bookings.find(function(x){ return x.id === id; });
  var hasRepeat = b && b.repeatGroupId;
  if (hasRepeat) {
    showRepeatDeleteConfirm(id);
  } else {
    showConfirm('예약 삭제','이 예약을 삭제하시겠습니까?', function(){
      bookings = bookings.filter(function(x){ return x.id !== id; });
      saveData(); closeModal('booking'); renderTab(currentTab); showToast('삭제되었습니다');
    }, true);
  }
}

function showRepeatDeleteConfirm(id) {
  var b = bookings.find(function(x){ return x.id === id; });
  if (!b) return;
  showConfirm('반복 예약 삭제','어떻게 삭제하시겠습니까?\n\n취소=이 예약만 삭제\n확인=전체 반복 삭제', function(){
    bookings = bookings.filter(function(x){ return x.repeatGroupId !== b.repeatGroupId; });
    saveData(); closeModal('booking'); renderTab(currentTab); showToast('반복 예약 전체 삭제');
  }, true);
  // override cancel to delete just this one
  document.getElementById('confirm-cancel').textContent = '이것만';
  document.getElementById('confirm-cancel').onclick = function(){
    document.getElementById('confirm-overlay').classList.remove('open');
    bookings = bookings.filter(function(x){ return x.id !== id; });
    saveData(); closeModal('booking'); renderTab(currentTab); showToast('이 예약만 삭제');
  };
}

function performTicketDeduct(ticketId, bookingId, count, amount, date, service, price) {
  var t = tickets.find(function(x){ return x.id === ticketId; });
  if (!t) return;
  var alreadyDeducted = ticketHistory.some(function(h){ return h.bookingId === bookingId && h.ticketId === ticketId; });
  if (alreadyDeducted && t.type === 'count') return;

  var deductAmt = t.type === 'count' ? count : amount;
  if (deductAmt <= 0) return;

  t.remain = Math.max(0, t.remain - deductAmt);
  if (t.remain === 0) t.closed = true;

  ticketHistory.push({ticketId:ticketId, bookingId:bookingId, date:date, servicePrice:price, discount:0, amount:deductAmt, remain:t.remain, reason:service});

  // update booking type
  var bk = bookings.find(function(x){ return x.id === bookingId; });
  if (bk) { bk.type = '이용권차감'; bk.ticketId = ticketId; }

  if (t.remain === 0) sendAlimtalk('ticketEmpty', bk||{name:t.memberName});
  else sendAlimtalk('ticketDeduct', bk||{name:t.memberName, price:deductAmt});
}

  currentDeductTicketId = ticketId;

  if (!t) return;

    html += '<div class="form-row"><div class="form-group"><div class="form-label">할인율(%)</div><input class="form-input" type="number" id="dd-discount-pct" oninput="calcDeductPay()" placeholder="0"></div>';
    html += '<div class="form-group"><div class="form-label">할인금액</div><input class="form-input" type="number" id="dd-discount-amt" oninput="calcDeductPay()" placeholder="0"></div></div>';
    html += '<div class="form-group"><div class="form-label">실결제액</div><input class="form-input" type="number" id="dd-final" readonly style="background:var(--bg)"></div>';
  } else {
    html += '<div class="form-group"><div class="form-label">서비스명</div><input class="form-input" id="dd-service" list="services-list2" placeholder="서비스 선택"><datalist id="services-list2">';

    html += '</datalist></div>';
    html += '<div class="form-group"><div class="form-label">차감 횟수</div><div class="count-btns">';
    [1,2,3,4,5].forEach(function(n){ html += '<button class="count-btn'+(n===1?' active':'')+'" data-val="'+n+'" onclick="selectDeductCountD(this)">'+n+'회</button>'; });
    html += '</div></div>';
  }

  document.getElementById('modal-deduct-body').innerHTML = html;
  document.getElementById('modal-deduct-footer').innerHTML = '<button class="btn btn-primary btn-full" onclick="executeDeduct()">차감하기</button>';

  memberBookings.forEach(function(b){

  });

function updateDeductBookingList() {
  var dateEl = document.getElementById('dd-date');
  if (!dateEl) return;
  var t = tickets.find(function(x){ return x.id === currentDeductTicketId; });
  if (!t) return;
  var memberBookings = bookings.filter(function(b){ return (b.name===t.memberName||b.memberId===t.memberId) && b.date===dateEl.value; });
  var listEl = document.getElementById('dd-booking-list');
  if (listEl) listEl.innerHTML = renderDeductBookingList(memberBookings, dateEl.value);
}

function selectDeductCountD(btn) {
  document.querySelectorAll('#modal-deduct-body .count-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
}

function calcDeductPay() {
  var svcPrice = parseInt(document.getElementById('dd-svc-price').value)||0;
  var discPct = parseInt(document.getElementById('dd-discount-pct').value)||0;
  var discAmt = parseInt(document.getElementById('dd-discount-amt').value)||0;
  var final = svcPrice - Math.round(svcPrice * discPct / 100) - discAmt;
  final = Math.max(0, final);
  document.getElementById('dd-final').value = final;
}

function executeDeduct() {
  var t = tickets.find(function(x){ return x.id === currentDeductTicketId; });
  if (!t) return;
  var dateEl = document.getElementById('dd-date');
  var date = dateEl ? dateEl.value : todayStr();
  var serviceEl = document.getElementById('dd-service');
  var service = serviceEl ? serviceEl.value : '';
  var selectedBooking = document.querySelector('[name="dd-booking"]:checked');
  var linkedBookingId = selectedBooking ? selectedBooking.value : '';

  var deductAmount = 0, deductCount = 0;
  if (t.type === 'money') {
    deductAmount = parseInt(document.getElementById('dd-final').value)||0;
    if (deductAmount <= 0) { showToast('차감 금액을 입력해주세요'); return; }
  } else {
    var activeCount = document.querySelector('#modal-deduct-body .count-btn.active');
    deductCount = activeCount ? parseInt(activeCount.dataset.val)||1 : 1;
  }

  var bookingId = linkedBookingId;
  if (linkedBookingId) {
    var linkedB = bookings.find(function(x){ return x.id === linkedBookingId; });
    if (linkedB) { linkedB.ticketId = t.id; linkedB.status = 'done'; linkedB.type = '이용권차감'; }
  } else {
    var newB = {id:uid(),date:date,time:'',name:t.memberName,phone:'',service:service,price:t.type==='money'?deductAmount:0,payMethod:'ticket',ticketId:t.id,status:'done',source:'',memo:'',duration:0,memberId:t.memberId||'',type:'이용권차감',unpaid:false,repeatGroupId:null,repeatIndex:0};
    bookings.push(newB);
    bookingId = newB.id;
  }

  var deductAmt = t.type === 'money' ? deductAmount : deductCount;
  t.remain = Math.max(0, t.remain - deductAmt);
  if (t.remain === 0) t.closed = true;

  var svcPriceEl = document.getElementById('dd-svc-price');
  ticketHistory.push({ticketId:t.id, bookingId:bookingId, date:date, servicePrice:svcPriceEl?parseInt(svcPriceEl.value)||0:0, discount:0, amount:deductAmt, remain:t.remain, reason:service});

  saveData();
  closeModal('deduct');
  renderTab(currentTab);
  showToast('차감되었습니다 (잔여: '+(t.type==='money'?fmtMoney(t.remain):(t.remain+'회'))+')');
  if (t.remain === 0) showToast('⚠️ 이용권이 소진되었습니다');
  sendAlimtalk('ticketDeduct', {name:t.memberName, price:deductAmt});
}

function selectPhotoTag(btn) {

function previewPhoto(input) {
  if (!input.files || !input.files[0]) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    var img = new Image();
    img.onload = function() {
      var canvas = document.createElement('canvas');
      var maxSize = 800;
      var scale = Math.min(maxSize/img.width, maxSize/img.height, 1);
      canvas.width = Math.round(img.width * scale);
      canvas.height = Math.round(img.height * scale);
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      var compressed = canvas.toDataURL('image/jpeg', 0.7);
      document.getElementById('ph-preview').innerHTML = '<img src="'+compressed+'" style="max-width:100%;border-radius:8px">';
      input._compressed = compressed;
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(input.files[0]);
}

function savePhoto(memberId) {
  var m = members.find(function(x){ return x.id === memberId; });
  if (!m) return;
  var fileInput = document.getElementById('ph-file');
  if (!fileInput || !fileInput._compressed) { showToast('사진을 선택해주세요'); return; }
  var date = document.getElementById('ph-date').value;
  var memo = document.getElementById('ph-memo').value;
  var activeTag = document.querySelector('#modal-photo .pay-btn.active');
  var tag = activeTag ? activeTag.dataset.val : 'memo';
  if (!m.photos) m.photos = [];
  m.photos.push({id:uid(), date:date, memo:memo, data:fileInput._compressed, tag:tag});
  saveData();
  closeModal('photo');
  openMemberDetail(memberId);
  showToast('사진이 저장되었습니다');

function removeDuplicateBookings() {
  var groups = {};
  bookings.forEach(function(b){
    var key = (b.date||'')+'|'+(b.name||'')+'|'+(b.service||'');
    if (!groups[key]) groups[key] = [];
    groups[key].push(b);
  });
  var toRemove = {};
  Object.keys(groups).forEach(function(key){
    var grp = groups[key];
    if (grp.length <= 1) return;
    // keep price-first, then latest
    grp.sort(function(a,b){ return (parseInt(b.price||0)) - (parseInt(a.price||0)); });
    grp.slice(1).forEach(function(b){ toRemove[b.id] = true; });
  });
  var removed = Object.keys(toRemove).length;
  bookings = bookings.filter(function(b){ return !toRemove[b.id]; });
  saveData(); renderDataPanel(); showToast(removed+'건 중복 제거 완료');
}

    var lines = e.target.result.split('\n');
    var added = 0;
    lines.slice(1).forEach(function(line){
      var cols = line.split(',');
      if (!cols[0]) return;
      var name = cols[0].trim();
      var phone = (cols[1]||'').trim();
      var salesAmt = parseInt((cols[2]||'0').replace(/[^\d]/g,''))||0;
      if (!name) return;
      var existing = members.find(function(m){ return m.phone && m.phone === phone; });
      if (!existing) existing = members.find(function(m){ return m.name === name && !m.phone; });
      if (!existing) {
        var newM = {id:uid(),name:name,phone:phone,email:'',memo:'',birth:'',src:'',visitCount:0,totalSales:0,lastVisit:'',createdAt:new Date().toISOString(),photos:[]};
        members.push(newM);
        existing = newM;
        added++;
      }
      if (salesAmt > 0) {
        bookings.push({id:uid(),date:todayStr(),time:'',name:name,phone:phone,service:'임포트 매출',price:salesAmt,payMethod:'card',ticketId:'',status:'done',source:'',memo:'CSV 임포트',duration:0,memberId:existing.id,type:'시술 매출',unpaid:false,repeatGroupId:null,repeatIndex:0});
      }
    });
    saveData(); renderDataPanel(); showToast(added+'명 임포트 완료');
  };
  reader.readAsText(input.files[0], 'UTF-8');
}

// ============================================================
function checkTicketExpiry() {
  var today = todayStr();
  var sevenDaysLater = new Date(); sevenDaysLater.setDate(sevenDaysLater.getDate()+7);
  var sevenStr = sevenDaysLater.getFullYear()+'-'+pad(sevenDaysLater.getMonth()+1)+'-'+pad(sevenDaysLater.getDate());
  if (!settings.notifiedTickets) settings.notifiedTickets = [];
  tickets.forEach(function(t){
    if (t.closed || !t.expire || t.remain <= 0) return;
    var key7 = t.id+'_7d';
    var key0 = t.id+'_0d';
    var notified7 = settings.notifiedTickets.some(function(n){ return n.ticketId===t.id && n.type==='7d'; });
    var notified0 = settings.notifiedTickets.some(function(n){ return n.ticketId===t.id && n.type==='0d'; });
    if (!notified7 && t.expire <= sevenStr && t.expire > today) {
      settings.notifiedTickets.push({ticketId:t.id, type:'7d', date:today});
      sendAlimtalk('ticketEmpty', {name:t.memberName, phone:''});
    }
    if (!notified0 && t.expire === today) {
      settings.notifiedTickets.push({ticketId:t.id, type:'0d', date:today});
      sendAlimtalk('ticketEmpty', {name:t.memberName, phone:''});
    }
  });
  saveData();
}

  var swCode = [
    'var CACHE_NAME="limeskin-v3";',
    'self.addEventListener("install",function(e){self.skipWaiting();});',
    'self.addEventListener("activate",function(e){e.waitUntil(self.clients.claim());});',

    '  e.respondWith(fetch(e.request).catch(function(){ return caches.match(e.request); }));',
    '});',
    'self.addEventListener("notificationclick",function(e){',
    '  e.notification.close();',
    '  e.waitUntil(clients.openWindow("/"));',
    '});',
    'function checkSchedule(){',
    '  var now=new Date();',

    '  }',
    '}',

  ].join('\n');
  var blob = new Blob([swCode], {type:'text/javascript'});

  navigator.serviceWorker.register(swUrl).then(function(reg){
